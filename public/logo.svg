<svg xmlns="http://www.w3.org/2000/svg" viewBox="45 45 410 410" width="100%" height="100%">
  <defs>
    <!-- Vinyl metallic sheen radial gradient -->
    <radialGradient id="vinyl-sheen" cx="50%" cy="50%" r="50%" fx="40%" fy="40%">
      <stop offset="0%" stop-color="#2d2d2d" />
      <stop offset="15%" stop-color="#141414" />
      <stop offset="35%" stop-color="#222222" />
      <stop offset="55%" stop-color="#0b0b0b" />
      <stop offset="75%" stop-color="#1c1c1c" />
      <stop offset="90%" stop-color="#080808" />
      <stop offset="100%" stop-color="#000000" />
    </radialGradient>
    
    <!-- Mask to bite out the top-right of the vinyl and red center label -->
    <mask id="bite-mask">
      <!-- Everything white remains visible -->
      <rect x="0" y="0" width="500" height="500" fill="white" />
      <!-- Black circle cuts out the bite -->
      <circle cx="330" cy="180" r="82" fill="black" />
    </mask>
  </defs>

  <!-- Group with mask applied to the vinyl body -->
  <g mask="url(#bite-mask)">
    <!-- Vinyl record body -->
    <circle cx="250" cy="250" r="200" fill="url(#vinyl-sheen)" />
    
    <!-- Grooves (concentric thin circles) -->
    <circle cx="250" cy="250" r="185" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
    <circle cx="250" cy="250" r="170" fill="none" stroke="rgba(255, 255, 255, 0.06)" stroke-width="1" />
    <circle cx="250" cy="250" r="150" fill="none" stroke="rgba(255, 255, 255, 0.08)" stroke-width="1.5" />
    <circle cx="250" cy="250" r="130" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    <circle cx="250" cy="250" r="110" fill="none" stroke="rgba(255, 255, 255, 0.07)" stroke-width="1.5" />
    <circle cx="250" cy="250" r="90" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
    
    <!-- Center label (red/burgundy) -->
    <circle cx="250" cy="250" r="65" fill="#9d0a34" />
    
    <!-- Center hole (black) -->
    <circle cx="250" cy="250" r="15" fill="#000000" />
  </g>

  <!-- Music note placed exactly over the bite area -->
  <!-- Note head (tilted ellipse, filled with white for maximum dark-mode visibility) -->
  <ellipse cx="328" cy="192" rx="34" ry="24" fill="white" stroke="#ff2d55" stroke-width="16" transform="rotate(-22 328 192)" />
  
  <!-- Note stem -->
  <line x1="355" y1="184" x2="395" y2="72" stroke="#ff2d55" stroke-width="16" stroke-linecap="round" />
  
  <!-- Note flag -->
  <path d="M 394 73 C 428 105, 465 140, 405 195 C 445 160, 435 125, 395 90 Z" fill="#ff2d55" />
</svg>
